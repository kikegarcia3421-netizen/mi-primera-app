<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mostrar Nombre</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #ffffff;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        h1 {
            color: #333;
            margin-bottom: 1rem;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
            margin-bottom: 1rem;
            font-size: 16px;
            transition: border 0.3s;
        }

        input:focus {
            border-color: #a5b4fc;
        }

        button {
            background: #a5b4fc;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #818cf8;
        }

        .resultado {
            margin-top: 1.5rem;
            font-size: 1.2rem;
            color: #555;
        }

        @media (max-width: 480px) {
            .container {
                padding: 1.5rem;
            }

            h1 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Ingresa tu nombre</h1>
        <input type="text" id="nombre" placeholder="Escribe tu nombre">
        <button onclick="mostrarNombre()">Mostrar</button>
        <div class="resultado" id="resultado"></div>
    </div>

    <script>
        function mostrarNombre() {
            const nombre = document.getElementById('nombre').value;
            const resultado = document.getElementById('resultado');

            if (nombre.trim() === "") {
                resultado.textContent = "Por favor escribe un nombre.";
            } else {
                resultado.textContent = "Hola, " + nombre + " 👋";
            }
        }
    </script>

</body>

</html>
